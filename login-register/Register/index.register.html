<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.register.css?v=20260329-admin-theme">
</head>
<body>

    <div class="header">
        <h1>Create an account</h1>
    </div>

    <div class="container">
        <div class="card">
            <div class="logo-icon">
                <img src="WhatsApp Image 2026-02-02 at 12.47.37.jpeg" alt="logo-icon" class="logo-icon">
            </div>
            <h2>Register</h2>

            <form id="registerForm">
                <label>Username</label>
                <input type="text" id="username" required>

                <label>Email</label>
                <input type="email" id="email" required>

                <label>Password</label>
                <input type="password" id="password" required>

                <button type="submit" class="signup-btn">Sign Up</button>

                <div class="divider">or</div>

                <button type="button" class="google-btn">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                    Continue with Google
                </button>

                <p class="register-label">Sudah memiliki akun?</p>
                <a href="../Login/index.html" class="google-btn register-btn">Login</a>

                <div class="error" id="errorMsg"></div>
            </form>
        </div>
    </div>

    <!-- External JS -->
    <script src="script.register.js"></script>

</body>
</html>
