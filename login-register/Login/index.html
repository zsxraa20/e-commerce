<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css?v=20260329-admin-theme">
</head>
<body>

    <div class="header">
        <h1>Welcome back</h1>
    </div>

    <div class="container">
        <div class="card">
            <div class="logo-icon">
                <img src="WhatsApp Image 2026-02-02 at 12.47.37.jpeg" alt="logo-icon" class="logo-icon">
            </div>
            <h2>Login</h2>

            <form id="loginForm">
                <label>Email</label>
                <input type="email" id="email" required>

                <label>Password</label>
                <input type="password" id="password" required>

                <button type="submit" class="login-btn">Log in</button>

                <div class="divider">or</div>

                <button type="button" class="google-btn">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                    Continue with Google
                </button>

                <p class="register-label">Masih belum punya akun?</p>
                <a href="../Register/index.register.html" class="google-btn register-btn">Daftar</a>

                <div class="error" id="errorMsg"></div>

                <footer class="footer">
                    <p>&copy; 2026 e-phone. Hak cipta dilindungi undang-undang.</p>
                </footer>
            </form>
        </div>
    </div>



    <!-- External JS -->
    <script src="script.js"></script>

</body>
</html>
